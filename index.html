<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFCE Planner Fofo</title>
    <style>
        :root {
            --bg: #ffeef2;
            --card: #ffffff;
            --primary: #ff5d8f;
            --secondary: #ffacc5;
            --accent: #89ced6;
            --text: #3d3d3d;
            --bus: #ff85a1;
            --success: #67d477;
            --danger: #ff4d4d;
            --highlight: #ffc2d1;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 600px; }
        h1 { color: var(--primary); text-align: center; margin-bottom: 20px; font-size: 1.8rem; letter-spacing: 2px; text-shadow: 2px 2px white; font-weight: 900; }

        .menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            margin-bottom: 20px;
        }

        button {
            background: var(--card);
            color: var(--text);
            border: 2px solid var(--secondary);
            padding: 12px 8px;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            box-shadow: 0 4px 0 var(--secondary);
        }

        button:active { transform: translateY(3px); box-shadow: none; }
        .btn-config { border-color: var(--bus); color: #c2185b; box-shadow: 0 4px 0 var(--bus); }
        .btn-notes { border-color: var(--success); color: #1b5e20; box-shadow: 0 4px 0 var(--success); }
        .btn-grades {
            border-color: var(--primary);
            color: white;
            grid-column: span 2;
            font-size: 0.95rem;
            padding: 16px;
            background: var(--primary);
            box-shadow: 0 5px 0 #d81b60;
        }
        .btn-backup { border-color: var(--accent); color: #006064; grid-column: span 2; box-shadow: 0 4px 0 var(--accent); }

        #config-panel, #backup-panel {
            display: none;
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(255, 93, 143, 0.2);
            border: 3px solid var(--primary);
        }

        .config-box {
            background: #fff5f7;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--secondary);
        }

        .config-box h4 { margin: 0 0 10px 0; color: var(--primary); text-transform: uppercase; font-size: 0.85rem; }

        .config-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }

        #config-panel input {
            border: 1px solid var(--secondary);
            border-radius: 10px;
            padding: 8px;
            font-size: 0.85rem;
            color: var(--text);
            box-sizing: border-box;
        }

        .in-bus { flex: 1 1 100%; font-weight: bold; color: var(--primary); }
        .in-time { flex: 1 1 70px; text-align: center; min-width: 60px; }
        .in-aula { flex: 3 1 150px; }
        .in-sala { flex: 1 1 60px; text-align: center; background: var(--accent) !important; color: white !important; font-weight: bold; min-width: 50px; }

        .btn-del {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: none;
            padding: 5px;
            font-weight: bold;
            flex: 0 0 auto;
        }

        .section-title { color: var(--primary); text-transform: uppercase; font-size: 0.9rem; margin: 30px 0 12px 0; border-bottom: 3px solid var(--primary); width: 100%; letter-spacing: 2px; font-weight: 900; text-align: center; background: white; padding: 5px 0; border-radius: 10px 10px 0 0; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 2px solid var(--secondary); width: 100%; box-sizing: border-box; box-shadow: 0 6px 12px rgba(255, 140, 148, 0.1); }

        .card.today-highlight {
            border: 3px solid var(--primary);
            background: #fff0f5;
        }
        .today-badge { background: var(--primary); color: #fff; font-size: 0.7rem; padding: 3px 10px; border-radius: 10px; margin-left: 10px; font-weight: 900; }

        .card h2 { color: var(--primary); margin: 0 0 10px 0; font-size: 1.4rem; font-weight: 900; }
        .bus-txt { color: #d81b60; font-size: 0.85rem; font-weight: 800; margin-bottom: 12px; display: block; text-align: center; background: #ffe3e9; padding: 5px; border-radius: 10px; }
        .aula-item { display: flex; justify-content: space-between; font-size: 0.95rem; padding: 12px 0; border-bottom: 2px dashed #ffc2d1; color: #444; }
        .time { color: var(--primary); font-weight: 900; margin-right: 8px; }
        .sala { color: white; font-weight: bold; background: var(--accent); padding: 3px 10px; border-radius: 10px; font-size: 0.8rem; box-shadow: 0 2px 0 #6ebcc5; }

        textarea { width: 100%; background: #fff; color: var(--text); border: 2px solid var(--secondary); border-radius: 12px; padding: 12px; margin-top: 10px; min-height: 100px; resize: none; box-sizing: border-box; font-family: inherit; font-size: 1rem; }

        .todo-line { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #ffe0e5; }
        .todo-line input[type="checkbox"] { width: 24px; height: 24px; accent-color: var(--primary); cursor: pointer; }

        .quick-add { display: flex; gap: 8px; margin-bottom: 15px; background: #fff5f7; padding: 10px; border-radius: 12px; border: 1px solid var(--secondary); }
        .quick-add input[type="text"] { flex: 1; border: 1px solid var(--secondary); border-radius: 8px; padding: 8px; }
        .btn-add-quick { background: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 8px; box-shadow: 0 3px 0 #4caf50; }

        .btn-clean { background: white; border: 2px solid var(--danger); color: var(--danger); width: 100%; margin-top: 15px; padding: 10px; font-weight: 800; border-radius: 12px; }

        #importFile { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ MEU PLANNER ✨</h1>

        <div class="menu">
            <button class="btn-grades" onclick="irParaNotas()">📊 VER MINHAS NOTAS E MÉDIAS</button>
            <button class="btn-config" onclick="toggleConfig()">⚙️ EDITAR HORÁRIOS</button>
            <button class="btn-notes" onclick="baixarNotasTxt()">📝 BAIXAR RESUMO (.TXT)</button>
            <button class="btn-backup" onclick="toggleBackup()">☁️ BACKUP E RESTAURAÇÃO</button>
        </div>

        <div id="backup-panel">
            <h3 style="margin-top:0; color: var(--primary)">Gerenciar Meus Dados</h3>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button onclick="baixarEstrutura()" style="border-color: var(--success); color: #1b5e20;">📤 Exportar</button>
                <button onclick="document.getElementById('importFile').click()" style="border-color: var(--accent); color: #006064;">📥 Importar</button>
                <input type="file" id="importFile" accept=".json" onchange="importarBackup(this)">
            </div>
            <button onclick="toggleBackup()" style="margin-top: 15px; border:none; background:none; color: #999; font-weight: bold; cursor:pointer;">[ FECHAR ]</button>
        </div>

        <div id="config-panel">
            <h3 style="margin-top:0; color: var(--primary)">🎀 Editar Cronograma Semanal</h3>
            <div id="dias-editor"></div>

            <h3 style="color: var(--accent)">📖 Minhas Matérias</h3>
            <div id="mats-editor"></div>
            <button onclick="addItem()" style="width:100%; padding:12px; margin-top:10px; border-color: var(--accent); box-shadow: 0 4px 0 var(--accent);">+ Nova Matéria</button>

            <button style="background: var(--primary); color: white; border: none; width: 100%; margin: 30px 0 10px 0; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 1.1rem; box-shadow: 0 6px 0 #d81b60; cursor:pointer;" onclick="salvarEFechar()">💖 SALVAR ALTERAÇÕES</button>
        </div>

        <div id="render-area"></div>
    </div>

    <script>
        const defaultData = {
            dias: [
                { nome: "Segunda", bus: "16:15 ➔ 21:40", aulas: [["17:30", "Matéria 1", "S01"]] },
                { nome: "Terça", bus: "12:20 ➔ 17:40", aulas: [["13:00", "Matéria 2", "S02"]] },
                { nome: "Quarta", bus: "12:20 ➔ 15:20", aulas: [["13:00", "Matéria 2", "S02"]] },
                { nome: "Quinta", bus: "16:15 ➔ 21:40", aulas: [["17:30", "Matéria 3", "S03"]] },
                { nome: "Sexta", bus: "12:20 ➔ 19:40", aulas: [["13:00", "Matéria 1", "S01"]] }
            ],
            materias: ["Matéria 1", "Matéria 2"],
            todos: []
        };

        let dados = JSON.parse(localStorage.getItem('ifce_fofo_v7_3')) || defaultData;

        function irParaNotas() {
            localStorage.setItem('ufc_materias_transporte', JSON.stringify(dados.materias));
            window.location.href = 'notas.html';
        }

        function desenharTudo() {
            const area = document.getElementById('render-area');
            let html = "";
            const hojeData = new Date().toISOString().split('T')[0];
            const hojeNome = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"][new Date().getDay()];

            html += '<div class="section-title">✨ Lembretes da Princesa</div>';
            html += '<div class="card"><textarea id="not-geral" placeholder="Escreva aqui pensamentos importantes..."></textarea></div>';

            html += '<div class="section-title">✅ Tarefinhas do Dia</div><div class="card">';
            html += `
                <div class="quick-add">
                    <input type="text" id="new-todo-text" placeholder="O que precisa fazer?">
                    <input type="date" id="new-todo-date">
                    <button class="btn-add-quick" onclick="addTodoRapido()">+</button>
                </div>
                <div id="todo-list-area">`;

            if(dados.todos.length === 0) html += '<p style="color:#999; font-size:0.9rem; text-align:center; padding: 10px;">Nenhuma tarefa. Aproveite! 🌸</p>';

            dados.todos.forEach((t, i) => {
                const status = localStorage.getItem(`chk-${i}`) === 'true' ? 'checked' : '';
                const eHoje = (t.data === hojeData) ? 'style="color: var(--primary); font-weight:bold;"' : '';
                const dataFmt = t.data ? t.data.split('-').reverse().join('/') : '';
                html += `
                <label class="todo-line">
                    <input type="checkbox" id="chk-${i}" ${status} onchange="localStorage.setItem(this.id, this.checked)">
                    <span class="todo-text" ${eHoje}>${t.texto}</span>
                    ${t.data ? `<span style="font-size:0.75rem; color:var(--primary); font-weight:bold;">📅 ${dataFmt}</span>` : ''}
                    <button onclick="removerTodo(${i})" class="btn-del">✕</button>
                </label>`;
            });
            html += `</div><button class="btn-clean" onclick="limparConcluidos()">🧹 Limpar Concluídas</button></div>`;

            html += '<div class="section-title">📅 Meu Cronograma</div>';
            dados.dias.forEach(d => {
                const eHoje = (d.nome === hojeNome) ? 'today-highlight' : '';
                html += `<div class="card ${eHoje}">
                    <h2>${d.nome}${eHoje ? '<span class="today-badge">HOJE</span>' : ''}</h2>
                    <span class="bus-txt">🚌 Ônibus: ${d.bus}</span>`;
                d.aulas.forEach(a => {
                    html += `<div class="aula-item"><span><span class="time">${a[0]}</span> ${a[1]}</span><span class="sala">${a[2]}</span></div>`;
                });
                html += `</div>`;
            });

            html += '<div class="section-title">📚 Meus Cadernos</div>';
            dados.materias.forEach(m => {
                html += `<div class="card"><h2>${m}</h2><textarea id="not-${m}" placeholder="Anotações de ${m}..."></textarea></div>`;
            });

            area.innerHTML = html;
            recuperarNotas();
        }

        function addTodoRapido() {
            const txt = document.getElementById('new-todo-text').value;
            const data = document.getElementById('new-todo-date').value;
            if(!txt) return;
            dados.todos.push({texto: txt, data: data});
            localStorage.setItem('ifce_fofo_v7_3', JSON.stringify(dados));
            desenharTudo();
        }

        function removerTodo(idx) {
            dados.todos.splice(idx, 1);
            localStorage.setItem('ifce_fofo_v7_3', JSON.stringify(dados));
            desenharTudo();
        }

        function limparConcluidos() {
            if(!confirm("Remover tarefinhas completas?")) return;
            const novasTarefas = [];
            dados.todos.forEach((t, i) => {
                if(localStorage.getItem(`chk-${i}`) !== 'true') novasTarefas.push(t);
                localStorage.removeItem(`chk-${i}`);
            });
            dados.todos = novasTarefas;
            localStorage.setItem('ifce_fofo_v7_3', JSON.stringify(dados));
            desenharTudo();
        }

        function recuperarNotas() {
            document.querySelectorAll('textarea').forEach(tx => {
                tx.value = localStorage.getItem(tx.id) || '';
                tx.addEventListener('input', () => localStorage.setItem(tx.id, tx.value));
            });
        }

        function baixarEstrutura() {
            const backupTotal = {
                config: dados,
                storage: {},
                notas: JSON.parse(localStorage.getItem('ufc_sistema_notas_v1')) || {}
            };
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k.startsWith('not-') || k.startsWith('chk-')) backupTotal.storage[k] = localStorage.getItem(k);
            }
            const blob = new Blob(["\ufeff" + JSON.stringify(backupTotal, null, 2)], {type: 'application/json'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `backup_planner_fofo.json`;
            link.click();
        }

        function importarBackup(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const b = JSON.parse(e.target.result);
                if(!confirm("Restaurar backup?")) return;
                localStorage.clear();
                dados = b.config;
                localStorage.setItem('ifce_fofo_v7_3', JSON.stringify(dados));
                if(b.notas) localStorage.setItem('ufc_sistema_notas_v1', JSON.stringify(b.notas));
                if(b.storage) Object.keys(b.storage).forEach(k => localStorage.setItem(k, b.storage[k]));
                desenharTudo();
                alert("✨ Restaurado com sucesso!");
            };
            reader.readAsText(input.files[0]);
        }

        function baixarNotasTxt() {
            const dataHora = new Date().toLocaleString('pt-BR');
            let conteudo = `🌸 MEU PLANNER - RESUMO GERAL 🌸\n`;
            conteudo += `Gerado em: ${dataHora}\n`;
            conteudo += `==========================================\n\n`;

            // 1. Lembretes da Princesa
            const lembreteGeral = localStorage.getItem('not-geral') || "(Vazio)";
            conteudo += `✨ LEMBRETES DA PRINCESA:\n`;
            conteudo += `${lembreteGeral}\n\n`;
            conteudo += `------------------------------------------\n\n`;

            // 2. Checklist (Tarefas)
            conteudo += `✅ CHECKLIST DE TAREFAS:\n`;
            if (dados.todos.length === 0) {
                conteudo += `Nenhuma tarefa cadastrada.\n`;
            } else {
                dados.todos.forEach((t, i) => {
                    const feito = localStorage.getItem(`chk-${i}`) === 'true';
                    const icon = feito ? "[✅ FEITO]" : "[⏰ PENDENTE]";
                    const dataP = t.data ? ` (Prazo: ${t.data.split('-').reverse().join('/')})` : '';
                    conteudo += `${icon} ${t.texto}${dataP}\n`;
                });
            }
            conteudo += `\n------------------------------------------\n\n`;

            // 3. Cadernos (Matérias)
            conteudo += `📚 ANOTAÇÕES POR MATÉRIA:\n`;
            dados.materias.forEach(m => {
                const nota = localStorage.getItem(`not-${m}`) || "(Sem anotações)";
                conteudo += `> ${m.toUpperCase()}:\n${nota}\n\n`;
            });

            conteudo += `==========================================\n`;
            conteudo += `✨ Continue brilhando nos estudos! ✨`;

            const blob = new Blob(["\ufeff" + conteudo], {type: 'text/plain;charset=utf-8'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            const dataArquivo = new Date().toISOString().slice(0,10);
            link.download = `anotacoes_planner_${dataArquivo}.txt`;
            link.click();
        }

        function toggleConfig() {
            const p = document.getElementById('config-panel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
            if(p.style.display === 'block') abrirEditor();
        }

        function toggleBackup() {
            const p = document.getElementById('backup-panel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        function abrirEditor() {
            const dEd = document.getElementById('dias-editor');
            const mEd = document.getElementById('mats-editor');
            dEd.innerHTML = "";
            dados.dias.forEach((d, i) => {
                let diaHtml = `<div class="config-box"><h4>${d.nome}</h4>
                    <div class="config-row">🚌 <input type="text" class="in-bus" value="${d.bus}" oninput="dados.dias[${i}].bus=this.value"></div>`;
                d.aulas.forEach((aula, ai) => {
                    diaHtml += `<div class="config-row">
                        <input type="text" class="in-time" placeholder="Horário" value="${aula[0]}" oninput="dados.dias[${i}].aulas[${ai}][0]=this.value">
                        <input type="text" class="in-aula" placeholder="Matéria" value="${aula[1]}" oninput="dados.dias[${i}].aulas[${ai}][1]=this.value">
                        <input type="text" class="in-sala" placeholder="Sala" value="${aula[2]}" oninput="dados.dias[${i}].aulas[${ai}][2]=this.value">
                        <button class="btn-del" onclick="dados.dias[${i}].aulas.splice(${ai},1); abrirEditor()">✕</button>
                    </div>`;
                });
                diaHtml += `<button onclick="dados.dias[${i}].aulas.push(['','','']); abrirEditor()" style="width:100%; font-size:0.75rem; box-shadow:none;">+ Adicionar Aula</button></div>`;
                dEd.innerHTML += diaHtml;
            });
            mEd.innerHTML = "";
            dados.materias.forEach((m, i) => {
                mEd.innerHTML += `<div class="config-row">
                    <input type="text" value="${m}" oninput="dados.materias[${i}]=this.value" style="flex:1" placeholder="Nome da matéria">
                    <button class="btn-del" onclick="dados.materias.splice(${i},1); abrirEditor()">✕</button>
                </div>`;
            });
        }

        function addItem() {
            dados.materias.push("Nova Matéria");
            abrirEditor();
        }

        function salvarEFechar() {
            dados.materias = dados.materias.filter(m => m.trim() !== "");
            localStorage.setItem('ifce_fofo_v7_3', JSON.stringify(dados));
            desenharTudo();
            toggleConfig();
        }

        window.onload = desenharTudo;
    </script>
</body>
</html>
