<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFCE Planner Fofo - Ultimate v7.3</title>
    <style>
        :root {
            --bg: #fff5f7;
            --card: #ffffff;
            --primary: #ff8c94; /* Rosa Principal */
            --secondary: #ffc2d1; /* Rosa Claro */
            --accent: #b0e0e6; /* Azul Bebê */
            --text: #4a4a4a;
            --bus: #ffafcc;
            --success: #a7e9af; /* Verde Pastel */
            --danger: #ff6b6b;
            --highlight: #f8bbd0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 600px; }
        h1 { color: var(--primary); text-align: center; margin-bottom: 20px; font-size: 1.6rem; letter-spacing: 2px; text-shadow: 1px 1px white; }

        .menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            margin-bottom: 20px;
        }

        button {
            background: var(--card);
            color: var(--text);
            border: 2px solid var(--secondary);
            padding: 12px 8px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
        }

        button:hover { background: var(--bg); transform: translateY(-2px); }
        .btn-config { border-color: var(--bus); color: #d81b60; }
        .btn-notes { border-color: var(--success); color: #2e7d32; }
        .btn-grades { 
            border-color: var(--primary); 
            color: var(--primary); 
            grid-column: span 2; 
            font-size: 0.85rem; 
            padding: 15px; 
            border-width: 2px;
            background: #fff0f3;
        }
        .btn-backup { border-color: var(--accent); color: #00838f; grid-column: span 2; }
        .btn-clean { background: #fff0f0; border: 1px solid var(--danger); color: var(--danger); width: 100%; margin-top: 10px; padding: 8px; font-size: 0.7rem; border-radius: 10px; }

        #backup-panel, #config-panel {
            display: none;
            background: var(--card);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(255,140,148,0.1);
        }
        #backup-panel { border: 2px solid var(--accent); text-align: center; }
        #config-panel { border: 2px solid var(--primary); max-height: 85vh; overflow-y: auto; }

        .config-box { background: #fffcfd; border: 1px solid var(--secondary); padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        .config-box h4 { margin: 0 0 10px 0; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .config-row { 
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; align-items: center;
            background: white; padding: 8px; border-radius: 10px; border: 1px solid #fff0f3;
        }

        .config-row input { 
            background: #fff; color: var(--text); border: 1px solid #ffd1d7; padding: 10px; border-radius: 8px; font-size: 0.85rem; box-sizing: border-box;
        }

        .in-time { width: 70px; }
        .in-aula { flex: 1; min-width: 140px; }
        .in-sala { width: 60px; }
        .in-bus { width: 100%; margin-left: 5px; }

        .btn-del { background: none; border: none; color: var(--danger); font-weight: bold; cursor: pointer; font-size: 1.2rem; padding: 5px; }

        .section-title { color: var(--primary); text-transform: uppercase; font-size: 0.8rem; margin: 30px 0 12px 0; border-bottom: 2px solid var(--secondary); width: 100%; letter-spacing: 2px; font-weight: 800; text-align: center; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #ffe0e5; width: 100%; box-sizing: border-box; box-shadow: 0 4px 10px rgba(255, 140, 148, 0.05); }
        
        .card.today-highlight { 
            border: 2px solid var(--primary); 
            background: linear-gradient(145deg, #ffffff 0%, #fff9fa 100%);
            box-shadow: 0 0 15px rgba(255, 140, 148, 0.2);
        }
        .today-badge { background: var(--primary); color: #fff; font-size: 0.6rem; padding: 2px 8px; border-radius: 10px; vertical-align: middle; margin-left: 10px; font-weight: 900; }

        .card h2 { color: var(--primary); margin: 0 0 10px 0; font-size: 1.3rem; }
        .bus-txt { color: var(--bus); font-size: 0.8rem; font-weight: bold; margin-bottom: 12px; display: block; text-align: center; }
        .aula-item { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 10px 0; border-bottom: 1px dashed #ffe0e5; }
        .time { color: var(--primary); font-weight: bold; margin-right: 8px; }
        .sala { color: white; font-weight: bold; background: var(--accent); padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; }

        textarea { width: 100%; background: #fffcfd; color: var(--text); border: 1px solid #ffd1d7; border-radius: 12px; padding: 12px; margin-top: 10px; min-height: 100px; resize: none; box-sizing: border-box; font-family: inherit; font-size: 0.9rem; }
        .todo-line { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid #fff0f3; }
        .todo-line input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--primary); cursor: pointer; }

        #importFile { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ MEU IFCE PLANNER ✨</h1>

        <div class="menu">
            <button class="btn-grades" onclick="irParaNotas()">📊 Ver Minhas Notas</button>
            <button class="btn-config" onclick="toggleConfig()">⚙️ Personalizar</button>
            <button class="btn-notes" onclick="baixarNotasTxt()">📄 Baixar Anotações</button>
            <button class="btn-backup" onclick="toggleBackup()">☁️ Backup Nuvem</button>
        </div>

        <div id="backup-panel">
            <h3 style="margin-top:0; color: var(--primary)">Gerenciar Meus Dados</h3>
            <p style="font-size: 0.7rem; color: #888; margin-bottom: 15px;">Salva tudo: cronograma, tarefas e as notas da outra página!</p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button onclick="baixarEstrutura()" style="border-color: var(--success); color: #2e7d32;">📤 Exportar</button>
                <button onclick="document.getElementById('importFile').click()" style="border-color: var(--accent); color: #00838f;">📥 Importar</button>
                <input type="file" id="importFile" accept=".json" onchange="importarBackup(this)">
            </div>
            <button onclick="toggleBackup()" style="margin-top: 15px; border:none; background:none; color: #999;">Fechar</button>
        </div>

        <div id="config-panel">
            <h3 style="margin-top:0; color: var(--primary)">🎀 Editar Cronograma</h3>
            <div id="dias-editor"></div>
            
            <h3 style="color: var(--success)">🌸 Minhas Tarefas</h3>
            <div id="todo-editor"></div>
            <button onclick="addItem('todos')" style="width:100%; padding:12px; margin-top:10px; border-color: var(--success);">+ Nova Tarefa</button>
            
            <h3 style="color: var(--accent)">📖 Minhas Matérias</h3>
            <div id="mats-editor"></div>
            <button onclick="addItem('materias')" style="width:100%; padding:12px; margin-top:10px; border-color: var(--accent);">+ Nova Matéria</button>
            
            <button style="background: var(--primary); color: white; border: none; width: 100%; margin: 30px 0 10px 0; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 1rem; box-shadow: 0 4px 10px rgba(255,140,148,0.3);" onclick="salvarEFechar()">💖 SALVAR TUDO</button>
        </div>

        <div id="render-area"></div>
    </div>

    <script>
        const defaultData = {
            dias: [
                { nome: "Segunda", bus: "16:15 ➔ 21:40", aulas: [["17:30", "Probabilidade", "S05"], ["19:30", "Álgebra", "S04"]] },
                { nome: "Terça", bus: "12:20 ➔ 17:40", aulas: [["13:00", "Cálculo I", "S11"]] },
                { nome: "Quarta", bus: "12:20 ➔ 15:20", aulas: [["13:00", "Cálculo I", "S11"]] },
                { nome: "Quinta", bus: "16:15 ➔ 21:40", aulas: [["17:30", "Estrutura", "LAB 2"]] },
                { nome: "Sexta", bus: "12:20 ➔ 19:40", aulas: [["13:00", "Cálculo I", "S11"]] }
            ],
            materias: ["Estrutura de Dados", "Cálculo I"],
            todos: []
        };

        let dados = JSON.parse(localStorage.getItem('ifce_fofo_v7_3')) || defaultData;

        function irParaNotas() {
            localStorage.setItem('ufc_materias_transporte', JSON.stringify(dados.materias));
            window.location.href = 'notas.html';
        }

        function desenharTudo() {
            const area = document.getElementById('render-area');
            let html = "";
            const hojeData = new Date().toISOString().split('T')[0];
            const hojeNome = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"][new Date().getDay()];

            html += '<div class="section-title">✨ Lembretes da Princesa</div>';
            html += '<div class="card"><textarea id="not-geral" placeholder="Escreva aqui pensamentos ou coisas importantes..."></textarea></div>';

            html += '<div class="section-title">✅ Tarefinhas do Dia</div><div class="card">';
            if(dados.todos.length === 0) html += '<p style="color:#bbb; font-size:0.8rem; text-align:center;">Tudo em dia! ✨</p>';
            dados.todos.forEach((t, i) => {
                const status = localStorage.getItem(`chk-${i}`) === 'true' ? 'checked' : '';
                const eHoje = (t.data === hojeData) ? 'style="color: var(--primary); font-weight: bold;"' : '';
                const dataFmt = t.data ? t.data.split('-').reverse().join('/') : '';
                html += `
                <label class="todo-line">
                    <input type="checkbox" id="chk-${i}" ${status} onchange="localStorage.setItem(this.id, this.checked)"> 
                    <span ${eHoje}>${t.texto || "Nova Tarefa"}</span>
                    ${t.data ? `<span style="font-size:0.7rem; color:#ff8c94; margin-left:auto">📅 ${dataFmt}</span>` : ''}
                </label>`;
            });
            html += `<button class="btn-clean" onclick="limparConcluidos()">🧹 Limpar Concluídas</button></div>`;

            html += '<div class="section-title">📅 Meu Cronograma</div>';
            dados.dias.forEach(d => {
                const eHoje = (d.nome === hojeNome) ? 'today-highlight' : '';
                html += `<div class="card ${eHoje}">
                    <h2>${d.nome}${eHoje ? '<span class="today-badge">HOJE</span>' : ''}</h2>
                    <span class="bus-txt">🚌 ${d.bus}</span>`;
                d.aulas.forEach(a => {
                    html += `<div class="aula-item"><span><span class="time">${a[0]}</span> ${a[1]}</span><span class="sala">${a[2]}</span></div>`;
                });
                html += `</div>`;
            });

            html += '<div class="section-title">📚 Meus Cadernos</div>';
            dados.materias.forEach(m => {
                html += `<div class="card"><h2>${m || "Nova Matéria"}</h2><textarea id="not-${m}" placeholder="Anotações para ${m}..."></textarea></div>`;
            });

            area.innerHTML = html;
            recuperarNotas();
        }

        function limparConcluidos() {
            if(!confirm("Remover tarefinhas que você já completou?")) return;
            const novasTarefas = [];
            dados.todos.forEach((t, i) => {
                if(localStorage.getItem(`chk-${i}`) !== 'true') novasTarefas.push(t);
                localStorage.removeItem(`chk-${i}`);
            });
            dados.todos = novasTarefas;
            localStorage.setItem('ifce_fofo_v7_3', JSON.stringify(dados));
            desenharTudo();
        }

        function recuperarNotas() {
            document.querySelectorAll('textarea').forEach(tx => {
                tx.value = localStorage.getItem(tx.id) || '';
                tx.addEventListener('input', () => localStorage.setItem(tx.id, tx.value));
            });
        }

        // --- BACKUP UNIFICADO (PLANNER + NOTAS) ---
        function baixarEstrutura() {
            const agora = new Date();
            const dataFmt = agora.toLocaleDateString('pt-BR').replace(/\//g, '-');
            
            const backupTotal = { 
                config: dados, 
                storage: {},
                notas: JSON.parse(localStorage.getItem('ufc_sistema_notas_v1')) || {}
            };

            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k.startsWith('not-') || k.startsWith('chk-')) backupTotal.storage[k] = localStorage.getItem(k);
            }

            const blob = new Blob(["\ufeff" + JSON.stringify(backupTotal, null, 2)], {type: 'application/json'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `backup_fofo_ifce_${dataFmt}.json`;
            link.click();
        }

        function importarBackup(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const b = JSON.parse(e.target.result);
                    if(!confirm("Isso vai atualizar todo o seu planner. Posso continuar?")) return;
                    
                    localStorage.clear();
                    dados = b.config;
                    localStorage.setItem('ifce_fofo_v7_3', JSON.stringify(dados));
                    if(b.notas) localStorage.setItem('ufc_sistema_notas_v1', JSON.stringify(b.notas));
                    if(b.storage) {
                        Object.keys(b.storage).forEach(k => localStorage.setItem(k, b.storage[k]));
                    }
                    desenharTudo();
                    alert("✨ Prontinho! Seu planner foi restaurado!");
                    toggleBackup();
                } catch (err) { alert("❌ Ops, houve um erro no arquivo!"); }
            };
            reader.readAsText(input.files[0]);
        }

        function baixarNotasTxt() {
            const agora = new Date();
            let txt = `🌸 MINHAS ANOTAÇÕES IFCE - ${agora.toLocaleDateString()}\n\n`;
            txt += `💡 [LEMBRETES GERAIS]\n${localStorage.getItem('not-geral') || '-'}\n\n`;
            txt += `📚 [MEUS CADERNOS]\n`;
            dados.materias.forEach(m => {
                const n = localStorage.getItem(`not-${m}`);
                if(n) txt += `> ${m}: ${n}\n\n`;
            });
            const blob = new Blob(["\ufeff" + txt], {type: 'text/plain;charset=utf-8'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `meu_diario_academico.txt`;
            link.click();
        }

        function toggleBackup() {
            const p = document.getElementById('backup-panel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
            document.getElementById('config-panel').style.display = 'none';
        }

        function toggleConfig() {
            const p = document.getElementById('config-panel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
            document.getElementById('backup-panel').style.display = 'none';
            if(p.style.display === 'block') abrirEditor();
        }

        function abrirEditor() {
            const dEd = document.getElementById('dias-editor');
            const mEd = document.getElementById('mats-editor');
            const tEd = document.getElementById('todo-editor');
            
            dEd.innerHTML = "";
            dados.dias.forEach((d, i) => {
                let diaHtml = `<div class="config-box"><h4>${d.nome}</h4>
                    <div class="config-row">🚌 <input type="text" class="in-bus" value="${d.bus}" onchange="dados.dias[${i}].bus=this.value"></div>`;
                d.aulas.forEach((aula, ai) => {
                    diaHtml += `<div class="config-row">
                        <input type="text" class="in-time" value="${aula[0]}" onchange="dados.dias[${i}].aulas[${ai}][0]=this.value">
                        <input type="text" class="in-aula" value="${aula[1]}" onchange="dados.dias[${i}].aulas[${ai}][1]=this.value">
                        <input type="text" class="in-sala" value="${aula[2]}" onchange="dados.dias[${i}].aulas[${ai}][2]=this.value">
                        <button class="btn-del" onclick="dados.dias[${i}].aulas.splice(${ai},1); abrirEditor()">✕</button>
                    </div>`;
                });
                diaHtml += `<button onclick="dados.dias[${i}].aulas.push(['','','']); abrirEditor()" style="width:100%; font-size:0.75rem;">+ Aula</button></div>`;
                dEd.innerHTML += diaHtml;
            });

            tEd.innerHTML = "";
            dados.todos.forEach((t, i) => {
                tEd.innerHTML += `
                <div class="config-row">
                    <input type="text" value="${t.texto}" onchange="dados.todos[${i}].texto=this.value" style="flex:2">
                    <input type="date" value="${t.data}" onchange="dados.todos[${i}].data=this.value" style="width:130px">
                    <button class="btn-del" onclick="dados.todos.splice(${i},1); abrirEditor()">✕</button>
                </div>`;
            });

            mEd.innerHTML = "";
            dados.materias.forEach((m, i) => {
                mEd.innerHTML += `<div class="config-row">
                    <input type="text" value="${m}" onchange="dados.materias[i]=this.value" style="flex:1">
                    <button class="btn-del" onclick="dados.materias.splice(${i},1); abrirEditor()">✕</button>
                </div>`;
            });
        }

        function addItem(tipo) {
            if(tipo === 'todos') dados.todos.push({texto: "", data: ""});
            else dados.materias.push("");
            abrirEditor();
        }

        function salvarEFechar() {
            localStorage.setItem('ifce_fofo_v7_3', JSON.stringify(dados));
            desenharTudo();
            toggleConfig();
        }

        window.onload = desenharTudo;
    </script>
</body>
</html>
